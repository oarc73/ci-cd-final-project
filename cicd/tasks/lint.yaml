apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: lint
spec:
  workspaces:
  - name: source
  steps:
  - name: run-lint
    image: python:3.8-slim
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      pip install flake8
      flake8 service --count --select=E9,F63,F7,F82 --show-source --statistics
      flake8 service --count --exit-zero --max-complexity=10 --statistics