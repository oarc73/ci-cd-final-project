apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test
spec:
  workspaces:
  - name: source
  steps:
  - name: run-tests
    image: python:3.8-slim
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      pip install -r requirements.txt
      pip install pytest pytest-cov
      pytest tests/ --cov=service --cov-report=term-missing