apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: deploy
spec:
  params:
  - name: manifest-dir
    type: string
    default: "k8s"
  workspaces:
  - name: source
  steps:
  - name: run-deploy
    image: lachlanevenson/k8s-kubectl
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      kubectl apply -f $(params.manifest-dir)