apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-image
spec:
  params:
  - name: image-name
    type: string
  workspaces:
  - name: source
  steps:
  - name: build-and-push
    image: quay.io/buildah/stable
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      buildah bud -t $(params.image-name) .
      buildah push $(params.image-name)
    securityContext:
      privileged: true
      