apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: flake8
spec:
  workspaces:
    - name: source
  params:
    - name: image
      description: Image to use for flake8
      type: string
      default: "python:3.9-slim"
    - name: args
      description: Path or arguments to pass to flake8
      type: string
      default: "."
  steps:
    - name: flake8
      image: $(params.image)
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e
        python -m pip install --upgrade pip wheel
        pip install flake8
        flake8 $(params.args) --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 $(params.args) --count --max-complexity=10 --max-line-length=127 --statistics